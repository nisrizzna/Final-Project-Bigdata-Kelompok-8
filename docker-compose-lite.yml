# ╔══════════════════════════════════════════════════════════════════╗
# ║  VERSI RINGAN — Khusus testing tugas Orang 1                     ║
# ║  Services: Kafka (KRaft) + Producer API + Producer RSS + Consumer ║
# ║  TANPA: HDFS (namenode/datanode), YARN, Spark, Flask              ║
# ║                                                                    ║
# ║  Tujuan: verifikasi producer_api.py, producer_rss.py,             ║
# ║  consumer_to_hdfs.py BISA JALAN dan menghasilkan output yang     ║
# ║  benar di dashboard/data/, tanpa perlu RAM besar untuk HDFS/Spark. ║
# ║                                                                    ║
# ║  Catatan: consumer_to_hdfs.py tetap mencoba connect ke HDFS_URL,  ║
# ║  tapi karena namenode tidak ada, percobaan upload HDFS akan       ║
# ║  gagal (sudah ada try/except di kode) dan otomatis fallback ke    ║
# ║  simpan lokal saja. Ini cukup untuk membuktikan logika kerja.     ║
# ║                                                                    ║
# ║  Jalankan dengan:                                                  ║
# ║    docker compose -f docker-compose.orang1.yml up -d --build      ║
# ║  Hentikan dengan:                                                  ║
# ║    docker compose -f docker-compose.orang1.yml down               ║
# ╚══════════════════════════════════════════════════════════════════╝

networks:
  pangan-net:
    driver: bridge

services:

  # ════════════════════════════════════════════════════════
  # APACHE KAFKA (KRaft mode)
  # ════════════════════════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka_pangan
    hostname: kafka
    networks:
      - pangan-net
    ports:
      - "9092:9092"
    environment:
      TZ: "Asia/Jakarta"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # [DIKURANGI] Batasi heap JVM Kafka agar tidak makan RAM banyak
      KAFKA_HEAP_OPTS: "-Xmx384m -Xms256m"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # [DIKURANGI] Limit resource agar tidak rebutan dengan container lain
    deploy:
      resources:
        limits:
          memory: 768M

  # ════════════════════════════════════════════════════════
  # KAFKA CONSUMER TO HDFS
  # (HDFS_URL tetap diset, tapi namenode tidak ada di compose ini.
  #  Consumer akan fallback ke simpan lokal saja — ini sudah by design
  #  di kode consumer_to_hdfs.py, lihat fungsi hdfs_write() try/except)
  # ════════════════════════════════════════════════════════
  consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: consumer_pangan
    hostname: consumer
    networks:
      - pangan-net
    volumes:
      - .:/app
    environment:
      TZ: "Asia/Jakarta"
      KAFKA_BOOTSTRAP: kafka:29092
      # [CATATAN] HDFS sengaja diarahkan ke host yang tidak ada,
      # supaya percobaan upload gagal dengan rapi (timeout cepat)
      # dan langsung lanjut fallback simpan lokal.
      HDFS_URL: http://namenode:9870/webhdfs/v1
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ════════════════════════════════════════════════════════
  # KAFKA PRODUCER — Harga + Kurs
  # ════════════════════════════════════════════════════════
  producer-api:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: producer_api_pangan
    hostname: producer-api
    networks:
      - pangan-net
    volumes:
      - .:/app
    environment:
      TZ: "Asia/Jakarta"
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    command: ["python", "kafka/producer_api.py"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ════════════════════════════════════════════════════════
  # KAFKA PRODUCER — RSS Berita
  # ════════════════════════════════════════════════════════
  producer-rss:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: producer_rss_pangan
    hostname: producer-rss
    networks:
      - pangan-net
    volumes:
      - .:/app
    environment:
      TZ: "Asia/Jakarta"
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    command: ["python", "kafka/producer_rss.py"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  kafka_data: